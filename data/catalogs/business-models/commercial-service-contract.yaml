# @generated by /decompose-business-model on 2026-04-02T00:00:00Z, target: commercial_contract
# Commercial Service Contract — Business Model Decomposition
#
# B2B field service contracts with SLA-based recurring service delivery, formal inspections, and contract lifecycle management.

business_model:
  name: "Commercial Service Contract"
  category: "B2B Recurring Field Service"
  description: >
    Business-to-business field service model where providers bid on and negotiate contracts
    to deliver recurring services at commercial facilities. Revenue is contract-based with
    defined service level agreements, formal quality inspection regimes, and structured
    reporting. The sales cycle is longer (RFP/bid process, procurement approval) but yields
    higher contract values and more predictable revenue than residential models. Payment
    operates on net terms (net-30, net-60) rather than point-of-sale collection. Applies to
    janitorial services, commercial pest control, commercial HVAC maintenance, landscaping
    for commercial properties, commercial window cleaning, and facility maintenance.

analytics_reference: "business-model-analytics.md#commercial-service-contract"
system_mix_baseline:
  app: 0.20      # Client portal, reporting dashboards
  analytics: 0.15 # SLA compliance, profitability per contract, utilization
  work: 0.35     # Scheduling, dispatch, execution, inspections
  record: 0.30   # Contracts, SLAs, compliance docs, inspection records

required_capabilities:

  # --- CORE: What makes commercial contracts work ---

  - name: Contract Negotiation and Management
    apqc_context: "12.3"
    apqc_name: Manage enterprise contracts
    description: >
      End-to-end contract lifecycle: RFP response and proposal development, scope and
      pricing negotiation, SLA definition, contract execution, amendment tracking, and
      renewal management. Includes maintaining a contract repository with key dates,
      terms, and obligations.
    criticality: core
    example_vendors:
      - Salesforce CPQ
      - PandaDoc
      - ContractWorks

  - name: Service Level Agreement Compliance
    apqc_context: "5.2"
    apqc_name: Manage service delivery resources
    description: >
      Defining, tracking, and reporting SLA metrics including response time, service
      frequency adherence, quality scores, and coverage completeness. Triggers alerts
      on SLA breach risk and produces client-facing compliance reports. SLA performance
      feeds directly into contract renewal negotiations.
    criticality: core
    example_vendors:
      - ServiceTitan
      - Aspire Software
      - Janitorial Manager

  - name: Commercial Scheduling and Coverage Management
    apqc_context: "4.4"
    apqc_name: Plan and manage logistics
    description: >
      Scheduling recurring service at commercial facilities with constraints including
      after-hours windows, multi-site coordination, security access protocols, and
      minimum coverage requirements. Manages shift patterns, route optimization across
      facility clusters, and coverage gap detection to ensure SLA-defined service
      frequency is met.
    criticality: core
    example_vendors:
      - Swept
      - CleanTelligent
      - Workforce.com

  - name: Quality Inspection and Reporting
    apqc_context: "5.4"
    apqc_name: Manage quality of service delivery
    description: >
      Structured quality inspection programs with standardized scoring, deficiency
      tracking, corrective action workflows, and client-facing quality reports.
      Inspections may be provider-initiated, client-initiated, or joint walkthroughs.
      Inspection scores feed SLA compliance tracking and contract renewal evidence.
    criticality: core
    example_vendors:
      - OrangeQC
      - Janitorial Manager
      - CleanTelligent

  # --- SUPPORTING: Enables the core but not the differentiator ---

  - name: Commercial Sales and Bid Management
    apqc_context: "3.3"
    apqc_name: Manage selling activities
    description: >
      Managing the B2B sales pipeline from lead qualification through RFP response,
      site walkthrough, cost estimation, proposal development, and close. Includes
      competitor analysis, win/loss tracking, and relationship management with
      procurement and facilities management decision-makers.
    criticality: supporting
    example_vendors:
      - HubSpot
      - Salesforce
      - Pipedrive

  - name: Multi-Site and Facility Management
    apqc_context: "10.1"
    apqc_name: Plan and manage asset strategy
    description: >
      Managing service delivery across multiple locations for a single client account.
      Tracks facility-specific requirements (square footage, surface types, access
      protocols), consolidates reporting at account level, and coordinates service
      consistency across sites with different local teams.
    criticality: supporting
    example_vendors:
      - Aspire Software
      - FMX
      - ServiceChannel

  - name: After-Hours Workforce Coordination
    apqc_context: "7.3"
    apqc_name: Manage employee time and attendance
    description: >
      Managing evening, overnight, and weekend shift patterns typical of commercial
      service where work must occur when facilities are unoccupied. Includes security
      access coordination (alarm codes, key management, badge access), lone worker
      safety protocols, and shift differential compensation.
    criticality: supporting
    example_vendors:
      - Swept
      - Deputy
      - When I Work

  - name: Client Relationship Management
    apqc_context: "6.1"
    apqc_name: Plan and manage customer service operations
    description: >
      Ongoing account management for B2B client relationships including quarterly
      business reviews, escalation management, satisfaction surveys, and strategic
      account planning. Maintains stakeholder maps (facilities manager, procurement,
      building tenants) and communication cadence per account tier.
    criticality: supporting
    example_vendors:
      - Salesforce
      - Gainsight
      - HubSpot

  - name: Commercial Billing and Accounts Receivable
    apqc_context: "9.4"
    apqc_name: Manage accounts receivable
    description: >
      Contract-based billing with net-30/net-60 payment terms, purchase order
      matching, progress billing against contract milestones, and aging management.
      Handles multi-site consolidated invoicing, cost-plus and fixed-fee billing
      models, and integration with client procurement systems.
    criticality: supporting
    example_vendors:
      - QuickBooks
      - Aspire Software
      - Xero

  - name: Compliance and Documentation
    apqc_context: "11.2"
    apqc_name: Manage regulatory compliance
    description: >
      Maintaining safety certifications, employee background checks, OSHA compliance,
      chemical handling documentation, and facility-specific regulatory requirements.
      Produces compliance packages for contract bids and ongoing proof-of-compliance
      for active contracts. Tracks expiration dates and renewal requirements.
    criticality: supporting
    example_vendors:
      - SafetyCulture (iAuditor)
      - ComplianceQuest
      - Certify

  - name: Specialized Equipment and Supply Management
    apqc_context: "10.2"
    apqc_name: Plan and manage asset maintenance
    description: >
      Managing commercial-grade equipment (floor machines, carpet extractors,
      pressure washers) and facility-specific supply requirements. Tracks equipment
      assignment to sites, maintenance schedules, supply consumption per contract
      for cost tracking, and client-mandated product specifications (green cleaning,
      specific chemical requirements).
    criticality: supporting
    example_vendors:
      - Swept
      - Sortly
      - UpKeep

  # --- GENERIC: Every business needs these ---

  - name: Financial Accounting and Payroll
    apqc_context: "9.1"
    apqc_name: Manage the budget and financial plan
    description: >
      Standard financial accounting, payroll processing, and job costing. Includes
      contract profitability analysis, labor cost allocation per contract, and
      financial reporting. Payroll handles shift differentials and multi-site
      labor distribution.
    criticality: generic
    example_vendors:
      - QuickBooks
      - Gusto
      - ADP

  - name: Insurance and Liability Management
    apqc_context: "11.1"
    apqc_name: Manage enterprise risk
    description: >
      Managing general liability, workers compensation, and commercial property
      insurance at coverage levels required by commercial contracts (typically
      higher limits than residential). Produces certificates of insurance on
      demand for client procurement requirements and tracks policy renewals.
    criticality: generic
    example_vendors:
      - NEXT Insurance
      - Simply Business
      - The Hartford

  - name: Business Communication
    apqc_context: "6.2"
    apqc_name: Manage customer service requests
    description: >
      Standard business communication infrastructure including email, messaging,
      and document sharing. Supports formal communication channels with commercial
      clients (service request ticketing, scheduled reporting distribution) and
      internal team coordination across sites and shifts.
    criticality: generic
    example_vendors:
      - Microsoft 365
      - Google Workspace
      - Slack

differentiators:
  - SLA compliance rate — percentage of SLA targets met across contracts
  - Contract renewal rate and average contract tenure
  - Multi-site management efficiency — consistent quality scores across locations
  - Quality inspection scores and deficiency resolution time
  - Client reporting sophistication — real-time dashboards, trend analysis
  - Speed from RFP receipt to proposal submission
  - After-hours workforce reliability — shift fill rate, no-show rate

cross_domain_patterns:
  - capability: Contract Negotiation and Management
    source_vertical: managed_services_it
    why: >
      IT managed services follow the same SLA-based recurring contract pattern:
      RFP response, scope negotiation, SLA definition with measurable KPIs,
      recurring service delivery, compliance reporting, and contract renewal.
      The contract lifecycle and compliance reporting structures transfer directly.
  - capability: Quality Inspection and Reporting
    source_vertical: facility_management
    why: >
      Property management uses structured inspection frameworks (move-in/move-out,
      periodic condition assessments) with standardized scoring, photo documentation,
      deficiency tracking, and corrective action workflows. The inspection pattern
      and reporting structure apply directly to commercial service quality programs.

