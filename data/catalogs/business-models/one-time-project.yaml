# @generated by /decompose-business-model on 2026-04-02T00:00:00Z, target: one_time_project
# One-Time Project Service — Business Model Decomposition
#
# Field service archetype for one-time, project-based jobs: scope → quote → execute → close.

business_model:
  name: "One-Time Project Service"
  category: "Field Service"
  description: >
    Service businesses built around discrete, one-time projects with defined scope
    and completion criteria. Each job requires individual assessment, custom quoting,
    and dedicated execution — unlike recurring service where routes and routines
    stabilize over time. Examples include deep cleaning, landscaping transformations,
    one-time pest treatment, appliance installation, home staging, and post-construction
    cleanup. Revenue per job is high but acquisition cost is also high, making lead
    qualification and conversion to recurring service (where applicable) critical
    economic levers.

analytics_reference: "business-model-analytics.md#one-time-project"
system_mix_baseline:
  app: 0.20      # Customer-facing quoting/booking, portfolio showcase
  analytics: 0.10 # Quote accuracy tracking, conversion analysis
  work: 0.45     # Scoping, scheduling, execution, quality verification
  record: 0.25   # Scope documentation, before/after evidence, customer history

required_capabilities:

  # --- CORE: What makes project-based service work ---

  - name: Project Scoping and Assessment
    apqc_context: "5.1"
    apqc_name: Plan for and Align Service Delivery Resources
    description: >
      On-site or remote assessment of work needed for a specific project. This is
      the hardest capability to execute well — scope varies wildly by property
      condition, size, surfaces, and customer expectations. Inaccurate scoping
      cascades into quoting errors, schedule overruns, and margin compression.
    criticality: core
    example_vendors:
      - Jobber
      - ServiceTitan
      - CompanyCam

  - name: Project Quoting and Estimation
    apqc_context: "3.4"
    apqc_name: Develop and Manage Pricing Strategy
    description: >
      Translating assessed scope into a price the customer accepts and the business
      can deliver profitably. Formula is typically hours × rate + materials + risk
      margin, but the risk margin is where expertise lives. Under-quoting erodes
      margin; over-quoting loses the job.
    criticality: core
    example_vendors:
      - Jobber
      - Housecall Pro
      - ResponsiBid

  - name: Project Scheduling and Resource Allocation
    apqc_context: "5.1"
    apqc_name: Plan for and Align Service Delivery Resources
    description: >
      Assigning the right people, equipment, and time blocks to each project.
      One-time projects consume longer windows (4-8+ hours) than recurring visits,
      making scheduling Tetris more consequential — a single misallocation can
      ripple through an entire week.
    criticality: core
    example_vendors:
      - Jobber
      - ServiceTitan
      - Calendly

  - name: Project Execution and Quality Verification
    apqc_context: "5.2"
    apqc_name: Deliver Service to Customer
    description: >
      Tracking completion of work against the defined scope and verifying quality.
      Before/after documentation serves dual purpose: quality proof for the customer
      and portfolio content for marketing. The one-shot nature means there is no
      next-visit recovery — quality must be right the first time.
    criticality: core
    example_vendors:
      - CompanyCam
      - Jobber
      - ServiceTitan

  # --- SUPPORTING: Enables the core but not the differentiator ---

  - name: Lead Qualification and Conversion
    apqc_context: "3.3"
    apqc_name: Manage Leads and Opportunities
    description: >
      Qualifying inbound leads to filter viable projects from tire-kickers and
      out-of-scope requests. Project-based services attract high inquiry volume
      but conversion rates are lower than recurring — many people get quotes and
      never book. Speed-to-quote and follow-up cadence are key conversion levers.
    criticality: supporting
    example_vendors:
      - Jobber
      - Housecall Pro
      - GoHighLevel

  - name: Customer Communication and Expectation Management
    apqc_context: "6.1"
    apqc_name: Plan and Manage Customer Service Operations
    description: >
      Managing scope changes, timing expectations, property access logistics, and
      day-of coordination. One-time projects have higher communication overhead
      than recurring service because there is no established routine — every job
      is a first impression.
    criticality: supporting
    example_vendors:
      - Jobber
      - Podium
      - Housecall Pro

  - name: Specialized Equipment Management
    apqc_context: "10.1"
    apqc_name: Plan and Manage Asset Maintenance
    description: >
      Managing tools and equipment specific to project types. Project-based work
      often requires specialized gear (e.g., steam extractors, pressure washers,
      scaffolding) that must be allocated per-job and maintained between uses.
      Equipment availability directly constrains scheduling capacity.
    criticality: supporting
    example_vendors:
      - Asset Panda
      - UpKeep
      - Sortly

  - name: Crew and Worker Skill Matching
    apqc_context: "7.2"
    apqc_name: Recruit, Source, and Select Employees
    description: >
      Matching worker skills and experience to project requirements. Not all
      technicians can handle all project types — a post-construction cleanup
      requires different skills than a delicate home staging. Mismatching skill
      to scope causes quality failures and rework.
    criticality: supporting
    example_vendors:
      - Jobber
      - Homebase
      - Deputy

  - name: Post-Project Follow-up and Conversion
    apqc_context: "3.3"
    apqc_name: Manage Leads and Opportunities
    description: >
      Following up after project completion to collect reviews, request referrals,
      and convert one-time customers to recurring service where applicable. The
      project-to-recurring conversion rate (typically 25-40% for cleaning) is a
      critical business metric — each conversion reduces future acquisition cost.
    criticality: supporting
    example_vendors:
      - Jobber
      - Mailchimp
      - GoHighLevel

  - name: Reputation and Portfolio Management
    apqc_context: "3.1"
    apqc_name: Develop Marketing Strategy
    description: >
      Building and maintaining a portfolio of completed work through before/after
      photos, case studies, video content, and customer reviews. For project-based
      service, the portfolio IS the marketing — prospective customers need to see
      proof of capability on jobs similar to theirs.
    criticality: supporting
    example_vendors:
      - CompanyCam
      - Google Business Profile
      - Canva

  - name: Billing and Payment Collection
    apqc_context: "9.5"
    apqc_name: Process Accounts Receivable
    description: >
      Per-project invoicing for larger amounts than recurring service typically
      generates. Often involves deposit collection before work begins and balance
      due on completion. Higher per-invoice amounts increase collection risk and
      may require payment plan options.
    criticality: supporting
    example_vendors:
      - Jobber
      - QuickBooks
      - Square

  # --- GENERIC: Every business needs these ---

  - name: Financial Accounting
    apqc_context: "9.1"
    apqc_name: Perform Planning and Management Accounting
    description: >
      Standard financial management including revenue tracking, expense management,
      and tax preparation. Project-based revenue is lumpier than recurring, making
      cash flow forecasting more important and more difficult.
    criticality: generic
    example_vendors:
      - QuickBooks
      - Wave
      - Xero

  - name: Insurance and Liability Management
    apqc_context: "12.3"
    apqc_name: Manage Legal and Ethical Issues
    description: >
      Managing insurance coverage and liability exposure. Project-based work
      carries higher per-job risk than recurring service — larger scope means
      more surface area for property damage, injury, or disputes. Adequate
      coverage and clear service agreements are non-negotiable.
    criticality: generic
    example_vendors:
      - Next Insurance
      - Thimble
      - Simply Business

  - name: Business Communication
    apqc_context: "12.1"
    apqc_name: Manage Business Relationships
    description: >
      Internal team coordination and external business communication. Standard
      capability across all business models.
    criticality: generic
    example_vendors:
      - Google Workspace
      - Slack
      - Microsoft 365

differentiators:
  - Scope assessment accuracy — reducing variance between quote and actual
  - Quoting precision and speed-to-quote
  - Before/after portfolio quality as trust signal
  - One-time to recurring conversion rate
  - Specialist reputation in niche project types
  - On-site execution consistency across variable conditions

cross_domain_patterns:
  - capability: Project Scoping and Assessment
    source_vertical: construction
    why: >
      Construction estimating solves the same fundamental problem: assess current
      condition of a property, enumerate required work items, estimate labor and
      materials. The tooling (measurement, condition grading, scope checklists)
      and failure modes (scope creep, hidden conditions) are directly analogous.
  - capability: Project Quoting and Estimation
    source_vertical: insurance
    why: >
      Insurance underwriting prices risk on variable scope — exactly what project
      quoting does. Both must account for known factors, hidden variables, and
      tail risk. The actuarial mindset of building margin for uncertainty into
      every quote applies directly to field service project pricing.

