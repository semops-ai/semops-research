# @generated by /decompose-business-model on 2026-04-02T13:30:00Z, target: saas-plus-media
#
# SaaS + Ad-Supported Media — Business Model Decomposition
#
# Hybrid archetype: SaaS subscriptions combined with ad-supported content.
# Revenue from both recurring subscriptions AND impression-based advertising.
# Derived from  engagement (venue SaaS + ad network).

business_model:
  name: SaaS + Ad-Supported Media
  category: Hybrid (Subscription + Advertising)
  description: >
    Companies that deliver content or media experiences via SaaS subscription
    AND monetize attention/inventory via advertising. Two revenue streams share
    operational infrastructure — content quality drives both subscription
    retention and ad revenue. Examples: venue entertainment platforms (),
    streaming services with ad tiers (Spotify, YouTube), digital signage networks
    with programmatic ads, content platforms with subscription + sponsored content.

    The defining characteristic is the SHARED QUALITY CEILING: a single capability
    (typically content quality, classification, or curation) bottlenecks both
    revenue streams simultaneously. This creates correlated failure modes but
    also doubled ROI on quality investment.

analytics_reference: "subscription-saas.yaml + advertising-media.yaml (dual reference)"
system_mix_baseline:
  app: 0.35    # Content delivery, subscription management, real-time serving
  analytics: 0.25  # Dual-stream analytics: subscription health + ad performance
  work: 0.30   # Content enrichment, classification, curation — the hard problem
  record: 0.10  # Client contracts, brand rules, rights, billing facts

required_capabilities:

  # --- CORE: What makes this hybrid model work ---

  - name: Content Classification and Enrichment
    apqc_context: "2.1"
    apqc_name: Manage product and service portfolio
    description: >
      Tag, classify, and enrich content across multiple dimensions (genre, mood,
      brand safety, audience suitability, etc.) with sufficient precision for both
      subscription curation and ad targeting. This is typically the hard problem:
      classification quality sets the ceiling on both revenue streams. Multi-source
      enrichment (AI + human + 3P) with provenance tracking.
    criticality: core
    example_vendors:
      - Gracenote (metadata)
      - Custom ML pipeline
      - Human curation workflows

  - name: Content Composition and Curation
    apqc_context: "4.3"
    apqc_name: Produce/manufacture/deliver product
    description: >
      Compose content experiences (playlists, feeds, streams) from classified
      content, applying subscriber preferences, brand constraints, rights
      eligibility, and scheduling rules. The composed product is what subscribers
      pay for and where advertisers buy placement.
    criticality: core
    example_vendors:
      - Custom composition engine
      - Recommendation frameworks (Recombee, custom)

  - name: Brand Configuration and Constraint Engine
    apqc_context: "5.1"
    apqc_name: Develop customer care/customer management strategy
    description: >
      Per-client or per-subscriber-tier content constraints that filter eligibility
      at query time. Hard rules (exclude/require), not soft preferences. Creates
      switching costs when brand logic is deeply encoded. Applicable to enterprise
      SaaS tiers and advertiser brand safety requirements.
    criticality: core
    example_vendors:
      - Custom brand rule engine
      - DoubleVerify (brand safety)
      - IAS (Integral Ad Science)

  - name: Subscription Billing and Tier Management
    apqc_context: "10.3"
    apqc_name: Invoice customers
    description: >
      Recurring billing for the SaaS subscription stream. Manage tiers, feature
      entitlements, usage-based components, and renewal cycles. Revenue stability
      depends on subscription management quality.
    criticality: core
    example_vendors:
      - Stripe Billing
      - Chargebee
      - Recurly

  - name: Ad Serving and Inventory Management
    apqc_context: "3.5"
    apqc_name: Develop and manage sales plans
    description: >
      Serve ads into content experiences, manage ad placements, and allocate
      inventory between direct-sold and programmatic channels. Every content
      impression is an ad opportunity. Inventory volume scales with subscriber
      count and engagement depth.
    criticality: core
    example_vendors:
      - Google Ad Manager
      - Custom ad server
      - FreeWheel (video)

  - name: Programmatic Yield Optimization
    apqc_context: "10.3"
    apqc_name: Invoice customers
    description: >
      Maximize revenue per impression through programmatic auction participation,
      floor price optimization, and demand partner management. Yield optimization
      is the margin lever for the ad stream — same inventory, more revenue.
    criticality: core
    example_vendors:
      - Prebid
      - Google AdSense/AdX
      - Amazon Publisher Services

  # --- SUPPORTING: Enables the core but not the differentiator ---

  - name: Content Catalog and Identity Management
    apqc_context: "2.1"
    apqc_name: Manage product and service portfolio
    description: >
      Maintain the authoritative identity of content assets — what each piece of
      content IS (title, creator, format, series). Identity integrity is the
      foundation: if content identity is wrong, classification is wrong,
      composition is wrong, ad targeting is wrong.
    criticality: supporting
    example_vendors:
      - Custom CMS
      - Contentful
      - Asset management platforms

  - name: Content Distribution and Delivery
    apqc_context: "4.3"
    apqc_name: Produce/manufacture/deliver product
    description: >
      Deliver content to subscribers across endpoints — apps, web, devices,
      physical venues. Includes CDN, adaptive streaming, device management.
      Distribution reach determines ad inventory volume.
    criticality: supporting
    example_vendors:
      - Cloudflare
      - Fastly
      - Mux (video)

  - name: Audience Data and Contextual Targeting
    apqc_context: "3.1"
    apqc_name: Understand markets, customers, and capabilities
    description: >
      Collect and segment audience/subscriber data for ad targeting. In this
      hybrid model, first-party subscriber data is a targeting asset — subscribers
      provide richer signals than anonymous visitors. Contextual targeting from
      content classification adds precision.
    criticality: supporting
    example_vendors:
      - Segment
      - Custom CDP
      - Permutive

  - name: Subscriber Retention and Health Monitoring
    apqc_context: "5.1"
    apqc_name: Develop customer care/customer management strategy
    description: >
      Monitor subscriber health, predict churn, and trigger retention
      interventions. In the hybrid model, subscriber loss reduces both
      subscription revenue AND ad inventory — churn is doubly expensive.
    criticality: supporting
    example_vendors:
      - Gainsight
      - Vitally
      - Custom health scoring

  - name: Rights and Licensing Management
    apqc_context: "9.2"
    apqc_name: Develop and manage knowledge management strategy
    description: >
      Track content rights, licensing windows, and usage restrictions. Ensure
      content is legally available for both subscription delivery and ad-adjacent
      placement. Rights violations create legal and financial risk.
    criticality: supporting
    example_vendors:
      - Custom rights management
      - Vistex
      - FilmTrack

  - name: Engagement and Retention Analytics
    apqc_context: "13.6"
    apqc_name: Measure and benchmark
    description: >
      Track subscriber engagement, content performance, and retention metrics.
      Dual-stream analytics: subscription health (churn, NRR, engagement) and
      ad performance (impressions, CPM, fill rate, yield).
    criticality: supporting
    example_vendors:
      - Amplitude
      - Mixpanel
      - Google Analytics

  - name: Ad Sales and Partner Management
    apqc_context: "3.5"
    apqc_name: Develop and manage sales plans
    description: >
      Sell direct ad campaigns and manage demand partner relationships. Direct-sold
      commands premium CPMs. Partner management ensures fill rate.
    criticality: supporting
    example_vendors:
      - Salesforce
      - Boostr
      - Custom ad ops

  # --- GENERIC: Table stakes ---

  - name: Privacy and Consent Management
    apqc_context: "8.3"
    apqc_name: Develop and implement security, privacy, and data protection controls
    description: >
      Manage subscriber data privacy, ad tracking consent, and regulatory
      compliance (GDPR, CCPA). Both subscription data and ad behavioral data
      require privacy management.
    criticality: generic
    example_vendors:
      - OneTrust
      - Sourcepoint

  - name: Financial Planning and Accounting
    apqc_context: "10.1"
    apqc_name: Perform planning and management accounting
    description: >
      Revenue recognition across two streams (subscription: deferred revenue;
      advertising: impression-based). Dual-stream accounting adds complexity
      but uses standard tooling.
    criticality: generic
    example_vendors:
      - QuickBooks
      - NetSuite

  - name: Identity and Access Management
    apqc_context: "8.3"
    apqc_name: Develop and implement security, privacy, and data protection controls
    description: >
      Authenticate subscribers, manage enterprise client access, and handle
      advertiser/partner portal access. Multi-tenant when serving enterprise
      subscribers with brand configuration.
    criticality: generic
    example_vendors:
      - Auth0
      - WorkOS

  - name: Infrastructure and Platform Operations
    apqc_context: "8.4"
    apqc_name: Manage enterprise information
    description: >
      Host and scale content delivery, ad serving, and classification
      infrastructure. Must handle both subscriber-facing load and ad auction
      real-time requirements.
    criticality: generic
    example_vendors:
      - AWS
      - GCP
      - Datadog

differentiators:
  - "Content classification quality creating a shared quality ceiling across both revenue streams — the ROI on classification investment is doubled"
  - "First-party subscriber data as a premium ad targeting asset (subscribers provide richer signals than anonymous visitors)"
  - "Brand configuration depth creating switching costs for enterprise subscribers"
  - "Content graph depth from multi-source enrichment (AI + human + 3P) — multi-year labeling investment that competitors cannot shortcut"
  - "Subscriber engagement data feeding a content improvement flywheel (play/skip/completion signals improve classification)"
  - "Dual-revenue flywheel: subscriber count grows ad inventory, ad revenue funds better content/classification, better content retains subscribers"

cross_domain_patterns:
  - capability: Content Classification and Enrichment
    source_vertical: media_entertainment
    why: >
      Netflix-style content enrichment architecture (~200 data points per title,
      three-layer stack) is the reference pattern for content classification at
      scale. Most SaaS companies don't need this — the ad-supported media
      dimension creates the quality requirement.

  - capability: Programmatic Yield Optimization
    source_vertical: advertising_technology
    why: >
      Ad-tech programmatic patterns (header bidding, SSPs, yield floors) come
      from the advertising technology vertical. SaaS companies don't normally
      need this — the ad revenue stream imports it wholesale.

  - capability: Brand Configuration and Constraint Engine
    source_vertical: enterprise_saas
    why: >
      Per-client hard constraints at query time come from enterprise SaaS
      multi-tenancy patterns. Standard ad-supported media doesn't need per-client
      content constraints — the hybrid model creates this requirement.

